<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Dora's Workout Timer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f13; --surface: #1a1a22; --card: #22222e;
      --accent: #c084fc; --accent2: #818cf8; --green: #34d399;
      --text: #f1f0f5; --muted: #8b8a99; --border: #2e2e3e;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
    }
    header {
      padding: 16px 20px 12px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
      position: sticky; top: 0; background: var(--bg); z-index: 10; flex-shrink: 0;
    }
    .back-btn { background: none; border: none; color: var(--accent); font-size: 26px; cursor: pointer; padding: 0 8px 0 0; display: none; line-height: 1; }
    header h1 { font-size: 17px; font-weight: 700; }
    #header-sub { font-size: 12px; color: var(--muted); margin-top: 1px; }

    /* ── Views ── */
    .view { padding: 20px; display: none; flex-direction: column; flex: 1; }
    .view.active { display: flex; }

    /* ── Day Picker ── */
    #day-picker h2 { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; }
    .day-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 14px;
      padding: 14px 16px; margin-bottom: 8px; cursor: pointer;
      display: flex; align-items: center; justify-content: space-between;
      -webkit-tap-highlight-color: transparent; transition: border-color 0.15s;
    }
    .day-card:active { border-color: var(--accent); transform: scale(0.99); }
    .day-name { font-size: 16px; font-weight: 600; }
    .day-focus { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .day-meta { display: flex; align-items: center; gap: 6px; }
    .day-tag { font-size: 11px; color: var(--accent); background: rgba(192,132,252,0.12); padding: 3px 8px; border-radius: 6px; }
    .chevron { color: var(--muted); font-size: 18px; }

    /* ── Session View ── */
    .sess-title { font-size: 20px; font-weight: 700; }
    .sess-sub { font-size: 13px; color: var(--muted); margin-top: 3px; margin-bottom: 18px; }
    .step-list { flex: 1; overflow-y: auto; }
    .step-item {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 0; border-bottom: 1px solid var(--border);
    }
    .step-item:last-child { border-bottom: none; }
    .step-item.clickable { cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .step-item.clickable:active { opacity: 0.7; }
    .step-num {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      background: var(--surface); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: var(--muted);
    }
    .step-num.is-rest { background: rgba(52,211,153,0.08); border-color: rgba(52,211,153,0.3); color: var(--green); font-size: 10px; }
    .step-info { flex: 1; min-width: 0; }
    .step-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .step-note { font-size: 11px; color: var(--muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .step-right { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
    .step-dur { font-size: 12px; font-weight: 600; color: var(--accent2); background: rgba(129,140,248,0.1); padding: 2px 7px; border-radius: 5px; }
    .yt-dot { width: 8px; height: 8px; background: #ff4444; border-radius: 50%; }
    .run-btn {
      margin-top: 14px; width: 100%; padding: 15px;
      background: var(--accent); border: none; border-radius: 14px;
      color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; flex-shrink: 0;
    }
    .run-btn:active { opacity: 0.85; }

    /* ── Detail View ── */
    #detail-view { gap: 14px; }
    .det-name { font-size: 22px; font-weight: 800; line-height: 1.2; }
    .det-reps { font-size: 16px; font-weight: 700; color: var(--accent); }
    .det-note { font-size: 14px; color: var(--muted); line-height: 1.65; flex: 1; }
    .yt-link-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 18px; background: #cc0000; border: none; border-radius: 12px;
      color: #fff; font-size: 14px; font-weight: 600; text-decoration: none; cursor: pointer;
      align-self: flex-start; flex-shrink: 0;
    }
    .yt-link-btn:active { opacity: 0.85; }
    .start-here-btn {
      width: 100%; padding: 15px; background: var(--accent); border: none; border-radius: 14px;
      color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; flex-shrink: 0;
    }
    .start-here-btn:active { opacity: 0.85; }

    /* ── Flow View ── */
    #flow-view { padding: 14px 20px 22px; justify-content: space-between; }
    .fl-header { text-align: center; }
    .fl-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; }
    .fl-stepnum { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .fl-name { font-size: 20px; font-weight: 700; text-align: center; padding: 0 8px; line-height: 1.3; margin: 10px 0; }

    /* Ring */
    .ring-wrap { position: relative; width: 196px; height: 196px; align-self: center; }
    .ring-wrap svg { transform: rotate(-90deg); }
    #ring-bg { stroke: var(--border); }
    #ring-fg { stroke: var(--accent); stroke-linecap: round; transition: stroke-dashoffset 0.3s linear, stroke 0.3s; }
    .ring-inner { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    #time-display { font-size: 50px; font-weight: 800; letter-spacing: -2px; font-variant-numeric: tabular-nums; }
    #time-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

    /* Timed layout */
    #timed-layout { display: none; flex-direction: column; align-items: center; gap: 12px; }
    .fl-note { font-size: 13px; color: var(--muted); text-align: center; padding: 0 16px; line-height: 1.5; }

    /* Rep layout */
    #rep-layout {
      display: none; flex-direction: column; align-items: center; justify-content: center;
      gap: 12px; background: var(--card); border: 1px solid var(--border);
      border-radius: 18px; padding: 28px 20px; text-align: center;
    }
    .rep-count { font-size: 38px; font-weight: 800; color: var(--accent); }
    .rep-sub { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .rep-note { font-size: 13px; color: var(--muted); line-height: 1.55; }
    .rep-yt-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px; background: rgba(255,0,0,0.12); border: 1px solid rgba(255,60,60,0.3);
      border-radius: 8px; color: #ff5555; font-size: 13px; font-weight: 500;
      text-decoration: none; cursor: pointer;
    }

    /* Up next */
    .up-next { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; }
    .up-next-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
    .up-next-name { font-size: 13px; font-weight: 500; }

    /* Controls */
    .ctrl-row { display: flex; gap: 10px; margin-top: 10px; }
    .ctrl-btn {
      flex: 1; padding: 14px; border-radius: 12px; border: none;
      font-size: 15px; font-weight: 600; cursor: pointer;
    }
    .ctrl-btn:active { opacity: 0.7; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .btn-green { background: var(--green); color: #000; }
    .btn-wide { flex: 2; }

    /* Done */
    #done-view { align-items: center; justify-content: center; text-align: center; gap: 14px; }
    .done-emoji { font-size: 60px; }
    .done-title { font-size: 24px; font-weight: 800; }
    .done-sub { font-size: 14px; color: var(--muted); }
    .done-back { margin-top: 8px; padding: 14px 32px; background: var(--accent); border: none; border-radius: 14px; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; }
    .done-back:active { opacity: 0.85; }
  </style>
</head>
<body>

<header>
  <button class="back-btn" id="back-btn">‹</button>
  <div>
    <h1>Workout Timer</h1>
    <div id="header-sub">Choose your day</div>
  </div>
</header>

<!-- View 1: Day Picker -->
<div class="view" id="day-picker">
  <h2>Select Day</h2>
  <div id="day-list"></div>
</div>

<!-- View 2: Session -->
<div class="view" id="session-view">
  <div class="sess-title" id="sess-title"></div>
  <div class="sess-sub" id="sess-sub"></div>
  <div class="step-list" id="step-list"></div>
  <button class="run-btn" id="start-btn">▶ Start Session</button>
</div>

<!-- View 3: Exercise Detail -->
<div class="view" id="detail-view">
  <div class="det-name" id="det-name"></div>
  <div class="det-reps" id="det-reps"></div>
  <div class="det-note" id="det-note"></div>
  <a class="yt-link-btn" id="det-yt" href="" target="_blank" style="display:none">▶ Watch on YouTube</a>
  <button class="start-here-btn" id="det-start-btn">▶ Start from here</button>
</div>

<!-- View 4: Flow (timer + rep) -->
<div class="view" id="flow-view">
  <div class="fl-header">
    <div class="fl-label" id="fl-label"></div>
    <div class="fl-stepnum" id="fl-stepnum"></div>
  </div>

  <div class="fl-name" id="fl-name"></div>

  <!-- Timed -->
  <div id="timed-layout">
    <div class="ring-wrap">
      <svg width="196" height="196" viewBox="0 0 196 196">
        <circle id="ring-bg" cx="98" cy="98" r="84" fill="none" stroke-width="9"/>
        <circle id="ring-fg" cx="98" cy="98" r="84" fill="none" stroke-width="9"
          stroke-dasharray="527.8" stroke-dashoffset="0"/>
      </svg>
      <div class="ring-inner">
        <div id="time-display">0</div>
        <div id="time-label">seconds</div>
      </div>
    </div>
    <div class="fl-note" id="fl-note"></div>
  </div>

  <!-- Rep -->
  <div id="rep-layout">
    <div class="rep-sub">Do</div>
    <div class="rep-count" id="fl-reps"></div>
    <div class="rep-note" id="fl-rep-note"></div>
    <a class="rep-yt-btn" id="fl-yt" href="" target="_blank" style="display:none">▶ Watch example</a>
  </div>

  <div>
    <div class="up-next" id="up-next-box">
      <div class="up-next-label">Up next</div>
      <div class="up-next-name" id="up-next-name">—</div>
    </div>

    <!-- Controls: running timed -->
    <div class="ctrl-row" id="ctrl-running" style="display:none">
      <button class="ctrl-btn btn-secondary" id="btn-restart">↺</button>
      <button class="ctrl-btn btn-primary btn-wide" id="btn-playpause">⏸ Pause</button>
      <button class="ctrl-btn btn-secondary" id="btn-skip-timed">Skip ›</button>
    </div>
    <!-- Controls: timed done, waiting for user -->
    <div class="ctrl-row" id="ctrl-done" style="display:none">
      <button class="ctrl-btn btn-secondary" id="btn-restart2">↺</button>
      <button class="ctrl-btn btn-green btn-wide" id="btn-next">Next ›</button>
    </div>
    <!-- Controls: rep step -->
    <div class="ctrl-row" id="ctrl-rep" style="display:none">
      <button class="ctrl-btn btn-green btn-wide" id="btn-done">Done ✓</button>
      <button class="ctrl-btn btn-secondary" id="btn-skip-rep">Skip ›</button>
    </div>
  </div>
</div>

<!-- View 5: Done -->
<div class="view" id="done-view">
  <div class="done-emoji">🎉</div>
  <div class="done-title">Session Complete!</div>
  <div class="done-sub" id="done-sub"></div>
  <button class="done-back" id="done-back-btn">← Back to Days</button>
</div>

// ─── STATE ───────────────────────────────────────────────────────────────────
let currentDay = null;
let currentStepIdx = 0;
let detailFromIdx = null;
let timeLeft = 0;
let totalTime = 0;
let timerInterval = null;
let isRunning = false;
const CIRC = 2 * Math.PI * 84; // 527.8

// ─── AUDIO ───────────────────────────────────────────────────────────────────
const ACtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function tryAudio() {
  try { if (!audioCtx) audioCtx = new ACtx(); audioCtx.resume(); } catch(e) {}
}
function beep(freq=880, dur=0.15, type='sine') {
  try {
    if (!audioCtx) audioCtx = new ACtx();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(0.35, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.start(audioCtx.currentTime); o.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}
function beepDone() {
  setTimeout(() => beep(660, 0.12), 0);
  setTimeout(() => beep(880, 0.12), 150);
  setTimeout(() => beep(1100, 0.25), 300);
}
function beepTick() { beep(440, 0.05, 'square'); }

// ─── VIEWS ───────────────────────────────────────────────────────────────────
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const back = document.getElementById('back-btn');
  const sub = document.getElementById('header-sub');
  if (id === 'day-picker') {
    back.style.display = 'none'; sub.textContent = 'Choose your day';
  } else if (id === 'session-view') {
    back.style.display = 'block'; sub.textContent = currentDay?.name || '';
  } else if (id === 'detail-view') {
    back.style.display = 'block'; sub.textContent = 'Exercise Detail';
  } else if (id === 'flow-view') {
    back.style.display = 'block'; sub.textContent = currentDay?.name || '';
  } else {
    back.style.display = 'block'; sub.textContent = currentDay?.name || '';
  }
}

// ─── DAY PICKER ──────────────────────────────────────────────────────────────
function buildDayPicker() {
  const list = document.getElementById('day-list');
  list.innerHTML = '';
  DAYS.forEach(day => {
    const timedCount = day.steps.filter(s => s.dur && s.type !== 'rest').length;
    const card = document.createElement('div');
    card.className = 'day-card';
    card.innerHTML = `
      <div>
        <div class="day-name">${day.name}</div>
        <div class="day-focus">${day.focus}</div>
      </div>
      <div class="day-meta">
        ${timedCount > 0 ? `<span class="day-tag">${timedCount} timers</span>` : ''}
        <span class="chevron">›</span>
      </div>`;
    card.addEventListener('click', () => { tryAudio(); openDay(day); });
    list.appendChild(card);
  });
}

// ─── SESSION VIEW ─────────────────────────────────────────────────────────────
function openDay(day) {
  currentDay = day;
  document.getElementById('sess-title').textContent = day.name;
  document.getElementById('sess-sub').textContent = day.focus;
  const list = document.getElementById('step-list');
  list.innerHTML = '';
  let exNum = 0;
  day.steps.forEach((step, i) => {
    const isRest = step.type === 'rest' || step.type === 'breathe';
    const item = document.createElement('div');
    item.className = 'step-item' + (isRest ? '' : ' clickable');
    if (!isRest) exNum++;
    const dur = step.dur;
    const durText = dur
      ? (dur >= 60 ? Math.floor(dur/60) + 'm' + (dur % 60 ? (dur%60)+'s' : '') : dur + 's')
      : (step.reps || '');
    item.innerHTML = `
      <div class="step-num${isRest ? ' is-rest' : ''}">${isRest ? '·' : exNum}</div>
      <div class="step-info">
        <div class="step-name">${step.name}</div>
        ${step.note && !isRest ? `<div class="step-note">${step.note.substring(0,55)}${step.note.length>55?'…':''}</div>` : ''}
      </div>
      <div class="step-right">
        ${step.link ? '<span class="yt-dot"></span>' : ''}
        ${durText ? `<span class="step-dur">${durText}</span>` : ''}
      </div>`;
    if (!isRest) item.addEventListener('click', () => openDetail(i));
    list.appendChild(item);
  });
  showView('session-view');
}

// ─── DETAIL VIEW ──────────────────────────────────────────────────────────────
function openDetail(idx) {
  detailFromIdx = idx;
  const step = currentDay.steps[idx];
  document.getElementById('det-name').textContent = step.name;
  document.getElementById('det-reps').textContent =
    step.dur ? `${step.dur}s` : (step.reps || '');
  document.getElementById('det-note').textContent = step.note || 'No additional notes.';
  const yt = document.getElementById('det-yt');
  if (step.link) { yt.href = step.link; yt.style.display = 'inline-flex'; }
  else { yt.style.display = 'none'; }
  showView('detail-view');
}

document.getElementById('det-start-btn').addEventListener('click', () => {
  tryAudio(); startSession(currentDay, detailFromIdx);
});

// ─── FLOW ─────────────────────────────────────────────────────────────────────
function startSession(day, fromIdx = 0) {
  currentDay = day;
  loadStep(fromIdx);
  showView('flow-view');
}

function loadStep(idx) {
  if (idx >= currentDay.steps.length) { showDone(); return; }
  clearInterval(timerInterval);
  isRunning = false;
  currentStepIdx = idx;
  const step = currentDay.steps[idx];

  document.getElementById('fl-label').textContent = typeLabel(step.type);
  document.getElementById('fl-stepnum').textContent = `Step ${idx+1} of ${currentDay.steps.length}`;
  document.getElementById('fl-name').textContent = step.name;
  updateUpNext(idx);

  if (step.dur != null) {
    // Timed step
    document.getElementById('timed-layout').style.display = 'flex';
    document.getElementById('rep-layout').style.display = 'none';
    document.getElementById('fl-note').textContent = step.note || '';

    const colors = { rest: '#34d399', breathe: '#818cf8', hold: '#c084fc' };
    document.getElementById('ring-fg').style.stroke = colors[step.type] || '#c084fc';

    timeLeft = step.dur; totalTime = step.dur;
    updateDisplay(timeLeft); updateRing(timeLeft, totalTime);
    showCtrl('running');
    startTimer();
  } else {
    // Rep step
    document.getElementById('timed-layout').style.display = 'none';
    document.getElementById('rep-layout').style.display = 'flex';
    document.getElementById('fl-reps').textContent = step.reps || '';
    document.getElementById('fl-rep-note').textContent = step.note || '';
    const flYt = document.getElementById('fl-yt');
    if (step.link) { flYt.href = step.link; flYt.style.display = 'inline-flex'; }
    else { flYt.style.display = 'none'; }
    showCtrl('rep');
  }
}

function showCtrl(state) {
  document.getElementById('ctrl-running').style.display = state === 'running' ? 'flex' : 'none';
  document.getElementById('ctrl-done').style.display = state === 'done' ? 'flex' : 'none';
  document.getElementById('ctrl-rep').style.display = state === 'rep' ? 'flex' : 'none';
}

function typeLabel(t) {
  return { rest: '⏸ Rest', breathe: '🌬 Breathe', hold: '💪 Hold', reps: '🏋️ Exercise' }[t] || '⏱ Timer';
}

function startTimer() {
  clearInterval(timerInterval);
  isRunning = true;
  document.getElementById('btn-playpause').textContent = '⏸ Pause';
  timerInterval = setInterval(tick, 1000);
}
function pauseTimer() {
  clearInterval(timerInterval); isRunning = false;
  document.getElementById('btn-playpause').textContent = '▶ Resume';
}
function tick() {
  timeLeft--;
  if (timeLeft <= 3 && timeLeft > 0) beepTick();
  updateDisplay(timeLeft); updateRing(timeLeft, totalTime);
  if (timeLeft <= 0) {
    clearInterval(timerInterval); isRunning = false;
    beepDone();
    showCtrl('done'); // wait for user to press Next
  }
}

// Skip: if on exercise/breathe, jump to next rest. If on rest, go to next step.
function handleSkip() {
  clearInterval(timerInterval); isRunning = false;
  const steps = currentDay.steps;
  const cur = steps[currentStepIdx];
  let next = currentStepIdx + 1;
  if (cur.type !== 'rest' && cur.type !== 'breathe') {
    // Find next rest
    while (next < steps.length && steps[next].type !== 'rest' && steps[next].type !== 'breathe') next++;
  }
  beep(660, 0.1);
  if (next >= steps.length) { showDone(); return; }
  loadStep(next);
}

function handleNext() {
  beep(660, 0.1);
  loadStep(currentStepIdx + 1);
}

function updateDisplay(t) {
  const m = Math.floor(t / 60), s = t % 60;
  document.getElementById('time-display').textContent =
    m > 0 ? `${m}:${String(s).padStart(2,'0')}` : String(t);
  document.getElementById('time-label').textContent = m > 0 ? 'min' : (t === 1 ? 'second' : 'seconds');
}
function updateRing(t, total) {
  const pct = total > 0 ? t / total : 0;
  document.getElementById('ring-fg').style.strokeDashoffset = CIRC * (1 - pct);
}
function updateUpNext(idx) {
  const next = currentDay.steps[idx + 1];
  const box = document.getElementById('up-next-box');
  if (next) {
    const label = next.dur != null
      ? `${next.name} · ${next.dur}s`
      : `${next.name}${next.reps ? ' · ' + next.reps : ''}`;
    document.getElementById('up-next-name').textContent = label;
    box.style.display = 'block';
  } else {
    box.style.display = 'none';
  }
}

function showDone() {
  clearInterval(timerInterval);
  document.getElementById('done-sub').textContent = `${currentDay.name} — ${currentDay.focus}`;
  showView('done-view');
}

// ─── CONTROLS ────────────────────────────────────────────────────────────────
document.getElementById('btn-playpause').addEventListener('click', () => {
  tryAudio(); isRunning ? pauseTimer() : startTimer();
});
document.getElementById('btn-restart').addEventListener('click', () => {
  tryAudio(); clearInterval(timerInterval); beep(440,0.08); loadStep(currentStepIdx);
});
document.getElementById('btn-restart2').addEventListener('click', () => {
  tryAudio(); clearInterval(timerInterval); beep(440,0.08); loadStep(currentStepIdx);
});
document.getElementById('btn-skip-timed').addEventListener('click', () => { tryAudio(); handleSkip(); });
document.getElementById('btn-next').addEventListener('click', () => { tryAudio(); handleNext(); });
document.getElementById('btn-done').addEventListener('click', () => { tryAudio(); handleNext(); });
document.getElementById('btn-skip-rep').addEventListener('click', () => { tryAudio(); handleSkip(); });

// ─── BACK NAV ────────────────────────────────────────────────────────────────
document.getElementById('back-btn').addEventListener('click', () => {
  clearInterval(timerInterval);
  const active = document.querySelector('.view.active')?.id;
  if (active === 'flow-view' || active === 'detail-view') {
    openDay(currentDay);
  } else if (active === 'session-view') {
    currentDay = null; buildDayPicker(); showView('day-picker');
  } else {
    currentDay = null; showView('day-picker');
  }
});
document.getElementById('start-btn').addEventListener('click', () => {
  tryAudio(); startSession(currentDay, 0);
});
document.getElementById('done-back-btn').addEventListener('click', () => {
  clearInterval(timerInterval); currentDay = null; buildDayPicker(); showView('day-picker');
});

// ─── INIT ────────────────────────────────────────────────────────────────────
buildDayPicker();
showView('day-picker');
</script>
