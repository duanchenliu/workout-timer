<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Dora's Workout Timer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:           #080910;
      --surface:      #0e0f18;
      --card:         #13141f;
      --accent:       #10b981;
      --accent-bg:    rgba(16,185,129,0.10);
      --accent-bdr:   rgba(16,185,129,0.22);
      --blue:         #60a5fa;
      --blue-bg:      rgba(96,165,250,0.10);
      --blue-bdr:     rgba(96,165,250,0.22);
      --amber:        #f59e0b;
      --amber-bg:     rgba(245,158,11,0.10);
      --amber-bdr:    rgba(245,158,11,0.22);
      --red:          #f87171;
      --red-bg:       rgba(248,113,113,0.08);
      --red-bdr:      rgba(248,113,113,0.22);
      --text:         #f0f0f8;
      --muted:        #6b6b82;
      --border:       #1c1d2a;
      --glass:        rgba(255,255,255,0.03);
      --glass-bdr:    rgba(255,255,255,0.07);
      --glass-shine:  rgba(255,255,255,0.05);
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Outfit', -apple-system, sans-serif;
      min-height: 100dvh; display: flex; flex-direction: column;
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      padding: 18px 22px 14px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
      position: sticky; top: 0; z-index: 10;
      background: rgba(8,9,16,0.88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      flex-shrink: 0;
    }
    .back-btn {
      background: none; border: none; color: var(--accent);
      font-family: 'Outfit', sans-serif;
      font-size: clamp(24px, 6vw, 30px); line-height: 1; cursor: pointer;
      padding: 0 10px 0 0; display: none;
      transition: opacity 0.15s;
    }
    .back-btn:active { opacity: 0.5; }
    header h1 { font-size: clamp(17px, 4.5vw, 22px); font-weight: 700; letter-spacing: -0.2px; }
    #header-sub { font-size: clamp(13px, 3.2vw, 16px); color: var(--muted); margin-top: 1px; }

    /* ── Views ──────────────────────────────────────────────── */
    .view { padding: 22px; display: none; flex-direction: column; flex: 1; }
    .view.active { display: flex; }

    /* ── Day Picker ─────────────────────────────────────────── */
    .picker-eyebrow {
      font-size: clamp(12px, 3vw, 14px); font-weight: 700; letter-spacing: 2.5px;
      color: var(--muted); text-transform: uppercase;
      margin-bottom: 18px;
    }
    .day-row {
      display: flex; align-items: center; gap: 14px;
      padding: 15px 0; border-bottom: 1px solid var(--border);
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      position: relative;
      transition: opacity 0.12s;
    }
    .day-row:last-child { border-bottom: none; }
    .day-row::after {
      content: ''; position: absolute;
      left: -22px; top: 0; bottom: 0; width: 2px;
      background: var(--accent);
      transform: scaleY(0); transform-origin: bottom;
      transition: transform 0.2s cubic-bezier(0.16,1,0.3,1);
    }
    .day-row:active { opacity: 0.55; }
    .day-row:active::after { transform: scaleY(1); }
    .day-idx {
      font-size: clamp(12px, 3vw, 15px); font-weight: 700; color: var(--border);
      width: 22px; text-align: right; flex-shrink: 0;
      letter-spacing: 0.5px;
    }
    .day-body { flex: 1; }
    .day-name { font-size: clamp(19px, 5vw, 24px); font-weight: 700; letter-spacing: -0.4px; }
    .day-focus { font-size: clamp(13px, 3.5vw, 17px); color: var(--muted); margin-top: 2px; font-weight: 400; }
    .day-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .day-tag {
      font-size: clamp(12px, 3vw, 14px); font-weight: 700; letter-spacing: 0.3px;
      color: var(--accent); background: var(--accent-bg);
      border: 1px solid var(--accent-bdr);
      padding: 3px 10px; border-radius: 20px;
    }
    .day-chev { color: var(--muted); font-size: clamp(17px, 4.5vw, 22px); opacity: 0.4; }

    /* ── Session View ───────────────────────────────────────── */
    .sess-header { margin-bottom: 22px; }
    .sess-title { font-size: clamp(28px, 7vw, 36px); font-weight: 800; letter-spacing: -0.8px; line-height: 1.1; }
    .sess-sub { font-size: clamp(14px, 3.5vw, 17px); color: var(--muted); margin-top: 5px; font-weight: 400; }
    .step-list { flex: 1; overflow-y: auto; }
    .step-row {
      display: flex; align-items: center; gap: 14px;
      padding: 13px 0; border-bottom: 1px solid var(--border);
      -webkit-tap-highlight-color: transparent;
    }
    .step-row:last-child { border-bottom: none; }
    .step-row.clickable { cursor: pointer; }
    .step-row.clickable:active { opacity: 0.55; }
    .step-idx {
      width: 24px; text-align: right; flex-shrink: 0;
      font-size: clamp(12px, 3vw, 15px); font-weight: 700; color: var(--border);
    }
    .step-idx.is-rest { color: var(--accent); opacity: 0.3; font-size: clamp(10px, 2.5vw, 13px); }
    .step-body { flex: 1; min-width: 0; }
    .step-name {
      font-size: clamp(15px, 4vw, 19px); font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .step-name.is-rest { color: var(--muted); font-weight: 400; font-size: clamp(14px, 3.5vw, 17px); }
    .step-note {
      font-size: clamp(12px, 3vw, 15px); color: var(--muted); margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .step-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .step-chip {
      font-size: clamp(12px, 3vw, 15px); font-weight: 600; color: var(--muted);
      background: var(--glass); border: 1px solid var(--glass-bdr);
      padding: 3px 9px; border-radius: 6px;
    }
    .step-chip.timed { color: var(--accent); background: var(--accent-bg); border-color: var(--accent-bdr); }
    .yt-dot { width: 6px; height: 6px; background: var(--red); border-radius: 50%; flex-shrink: 0; }
    .btn-start {
      width: 100%; padding: 16px; margin-top: 14px; flex-shrink: 0;
      background: var(--accent); border: none; border-radius: 14px;
      color: #fff; font-family: 'Outfit', sans-serif;
      font-size: clamp(16px, 4vw, 20px); font-weight: 700; letter-spacing: -0.2px;
      cursor: pointer;
      transition: transform 0.1s cubic-bezier(0.16,1,0.3,1), opacity 0.1s;
    }
    .btn-start:active { transform: scale(0.98); opacity: 0.88; }

    /* ── Detail View ────────────────────────────────────────── */
    #detail-view { gap: 16px; }
    .det-name { font-size: clamp(28px, 7vw, 36px); font-weight: 800; letter-spacing: -0.8px; line-height: 1.15; }
    .det-chip {
      display: inline-block;
      font-size: clamp(13px, 3.5vw, 17px); font-weight: 700; letter-spacing: 0.3px;
      color: var(--accent); background: var(--accent-bg);
      border: 1px solid var(--accent-bdr);
      padding: 5px 14px; border-radius: 20px;
    }
    .det-note { font-size: clamp(15px, 3.8vw, 19px); color: var(--muted); line-height: 1.7; flex: 1; }
    .yt-link {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 18px; text-decoration: none;
      background: var(--red-bg); border: 1px solid var(--red-bdr);
      border-radius: 12px; color: var(--red);
      font-family: 'Outfit', sans-serif; font-size: clamp(14px, 3.5vw, 17px); font-weight: 600;
      align-self: flex-start; flex-shrink: 0;
      transition: opacity 0.15s;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .yt-link svg { width: 15px; height: 15px; }
    .yt-link:active { opacity: 0.65; }
    .btn-here {
      width: 100%; padding: 16px; border: none;
      background: var(--accent); border-radius: 14px;
      color: #fff; font-family: 'Outfit', sans-serif;
      font-size: clamp(16px, 4vw, 20px); font-weight: 700; letter-spacing: -0.2px;
      cursor: pointer; flex-shrink: 0;
      transition: transform 0.1s cubic-bezier(0.16,1,0.3,1), opacity 0.1s;
    }
    .btn-here:active { transform: scale(0.98); opacity: 0.88; }

    /* ── Flow View ──────────────────────────────────────────── */
    #flow-view { padding: 16px 22px 26px; justify-content: space-between; gap: 12px; }
    .fl-top { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .fl-tag {
      font-size: clamp(11px, 2.8vw, 14px); font-weight: 800; letter-spacing: 2.5px;
      text-transform: uppercase; padding: 5px 13px; border-radius: 20px;
      border: 1px solid;
    }
    .fl-tag.hold  { color: var(--accent); background: var(--accent-bg); border-color: var(--accent-bdr); }
    .fl-tag.rest  { color: var(--blue);   background: var(--blue-bg);   border-color: var(--blue-bdr); }
    .fl-tag.breathe { color: var(--amber); background: var(--amber-bg); border-color: var(--amber-bdr); }
    .fl-tag.reps  { color: var(--muted);  background: var(--glass);     border-color: var(--glass-bdr); }
    .fl-stepnum { font-size: clamp(13px, 3.2vw, 16px); color: var(--muted); }
    .fl-name {
      font-size: clamp(22px, 5.5vw, 30px); font-weight: 800;
      text-align: center; letter-spacing: -0.5px; line-height: 1.25;
    }

    /* Ring */
    .ring-wrap { position: relative; width: 200px; height: 200px; align-self: center; }
    .ring-wrap svg { transform: rotate(-90deg); }
    #ring-bg { stroke: var(--border); }
    #ring-fg { stroke-linecap: round; transition: stroke-dashoffset 0.3s linear, stroke 0.3s; }
    .ring-inner {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    #time-display {
      font-size: clamp(58px, 15vw, 76px); font-weight: 900; letter-spacing: -3px;
      font-variant-numeric: tabular-nums;
    }
    #time-label { font-size: clamp(12px, 3vw, 15px); color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-top: 2px; }

    #timed-layout { display: none; flex-direction: column; align-items: center; gap: 14px; }
    .fl-note { font-size: clamp(14px, 3.5vw, 18px); color: var(--muted); text-align: center; line-height: 1.6; padding: 0 10px; }

    /* Rep layout — left-aligned, editorial */
    #rep-layout {
      display: none; flex-direction: column; align-items: flex-start;
      gap: 10px;
      background: var(--card);
      border: 1px solid var(--glass-bdr);
      box-shadow: inset 0 1px 0 var(--glass-shine);
      border-radius: 20px; padding: 26px 22px;
    }
    .rep-eyebrow {
      font-size: clamp(11px, 2.8vw, 14px); font-weight: 700; letter-spacing: 2.5px;
      text-transform: uppercase; color: var(--muted);
    }
    .rep-count {
      font-size: clamp(50px, 13vw, 64px); font-weight: 900;
      color: var(--accent); letter-spacing: -2.5px; line-height: 1;
    }
    .rep-note { font-size: clamp(14px, 3.5vw, 18px); color: var(--muted); line-height: 1.65; }
    .rep-yt {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px; text-decoration: none;
      background: var(--red-bg); border: 1px solid var(--red-bdr);
      border-radius: 8px; color: var(--red);
      font-family: 'Outfit', sans-serif; font-size: clamp(13px, 3.2vw, 16px); font-weight: 600;
      margin-top: 4px; transition: opacity 0.15s;
    }
    .rep-yt svg { width: 13px; height: 13px; }
    .rep-yt:active { opacity: 0.6; }

    /* Up next */
    .up-next {
      background: var(--glass); border: 1px solid var(--glass-bdr);
      box-shadow: inset 0 1px 0 var(--glass-shine);
      border-radius: 12px; padding: 11px 14px;
    }
    .up-next-label {
      font-size: clamp(11px, 2.8vw, 14px); font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: var(--muted); margin-bottom: 4px;
    }
    .up-next-name { font-size: clamp(14px, 3.5vw, 18px); font-weight: 500; }

    /* Controls */
    .ctrl-row { display: flex; gap: 10px; margin-top: 10px; }
    .ctrl-btn {
      flex: 1; padding: 16px; border-radius: 12px; border: none;
      font-family: 'Outfit', sans-serif; font-size: clamp(15px, 4vw, 19px); font-weight: 600;
      letter-spacing: -0.1px; cursor: pointer;
      transition: transform 0.1s cubic-bezier(0.16,1,0.3,1), opacity 0.1s;
    }
    .ctrl-btn:active { transform: scale(0.97); opacity: 0.8; }
    .c-primary { background: var(--accent); color: #fff; }
    .c-secondary {
      background: var(--card); color: var(--text);
      border: 1px solid var(--glass-bdr);
      box-shadow: inset 0 1px 0 var(--glass-shine);
    }
    .c-green { background: var(--accent); color: #fff; }
    .c-wide { flex: 2; }
    .c-full { width: 100%; font-size: clamp(16px, 4vw, 20px); padding: 16px; }

    /* Done */
    #done-view { align-items: center; justify-content: center; text-align: center; gap: 16px; }
    .done-ring {
      width: 72px; height: 72px; border-radius: 50%;
      background: var(--accent-bg); border: 1px solid var(--accent-bdr);
      display: flex; align-items: center; justify-content: center;
      color: var(--accent);
    }
    .done-title { font-size: clamp(28px, 7vw, 36px); font-weight: 800; letter-spacing: -0.8px; }
    .done-sub { font-size: clamp(15px, 3.8vw, 19px); color: var(--muted); }
    .done-back {
      margin-top: 8px; padding: 16px 36px;
      background: var(--accent); border: none; border-radius: 14px;
      color: #fff; font-family: 'Outfit', sans-serif;
      font-size: clamp(16px, 4vw, 20px); font-weight: 700; letter-spacing: -0.2px;
      cursor: pointer;
      transition: transform 0.1s cubic-bezier(0.16,1,0.3,1);
    }
    .done-back:active { transform: scale(0.97); }
  </style>
</head>
<body>

<header>
  <button class="back-btn" id="back-btn">‹</button>
  <div>
    <h1>Workout Timer</h1>
    <div id="header-sub">Choose your day</div>
  </div>
</header>

<!-- View 1: Day Picker -->
<div class="view" id="day-picker">
  <div class="picker-eyebrow">Weekly Plan</div>
  <div id="day-list"></div>
</div>

<!-- View 2: Session -->
<div class="view" id="session-view">
  <div class="sess-header">
    <div class="sess-title" id="sess-title"></div>
    <div class="sess-sub" id="sess-sub"></div>
  </div>
  <div class="step-list" id="step-list"></div>
  <button class="btn-start" id="start-btn">Start Session</button>
</div>

<!-- View 3: Exercise Detail -->
<div class="view" id="detail-view">
  <div class="det-name" id="det-name"></div>
  <div class="det-chip" id="det-reps"></div>
  <div class="det-note" id="det-note"></div>
  <a class="yt-link" id="det-yt" href="" target="_blank" style="display:none">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.7a3 3 0 0 0-2.1-2.1C19.6 4 12 4 12 4s-7.6 0-9.4.6a3 3 0 0 0-2.1 2.1C0 8.5 0 12 0 12s0 3.5.5 5.3a3 3 0 0 0 2.1 2.1C4.4 20 12 20 12 20s7.6 0 9.4-.6a3 3 0 0 0 2.1-2.1C24 15.5 24 12 24 12s0-3.5-.5-5.3zM9.75 15.02V8.98L15.5 12l-5.75 3.02z"/></svg>
    Watch on YouTube
  </a>
  <button class="btn-here" id="det-start-btn">Start from here</button>
</div>

<!-- View 4: Flow -->
<div class="view" id="flow-view">
  <div class="fl-top">
    <div class="fl-tag reps" id="fl-tag">Exercise</div>
    <div class="fl-stepnum" id="fl-stepnum">Step 1 of 1</div>
  </div>

  <div class="fl-name" id="fl-name"></div>

  <!-- Timed -->
  <div id="timed-layout">
    <div class="ring-wrap">
      <svg width="200" height="200" viewBox="0 0 200 200">
        <circle id="ring-bg" cx="100" cy="100" r="85" fill="none" stroke-width="8"/>
        <circle id="ring-fg" cx="100" cy="100" r="85" fill="none" stroke-width="8"
          stroke-dasharray="534" stroke-dashoffset="0"/>
      </svg>
      <div class="ring-inner">
        <div id="time-display">0</div>
        <div id="time-label">seconds</div>
      </div>
    </div>
    <div class="fl-note" id="fl-note"></div>
  </div>

  <!-- Rep -->
  <div id="rep-layout">
    <div class="rep-eyebrow">Reps</div>
    <div class="rep-count" id="fl-reps"></div>
    <div class="rep-note" id="fl-rep-note"></div>
    <a class="rep-yt" id="fl-yt" href="" target="_blank" style="display:none">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.7a3 3 0 0 0-2.1-2.1C19.6 4 12 4 12 4s-7.6 0-9.4.6a3 3 0 0 0-2.1 2.1C0 8.5 0 12 0 12s0 3.5.5 5.3a3 3 0 0 0 2.1 2.1C4.4 20 12 20 12 20s7.6 0 9.4-.6a3 3 0 0 0 2.1-2.1C24 15.5 24 12 24 12s0-3.5-.5-5.3zM9.75 15.02V8.98L15.5 12l-5.75 3.02z"/></svg>
      Watch example
    </a>
  </div>

  <div>
    <div class="up-next" id="up-next-box">
      <div class="up-next-label">Up next</div>
      <div class="up-next-name" id="up-next-name">—</div>
    </div>
    <div class="ctrl-row" id="ctrl-running" style="display:none">
      <button class="ctrl-btn c-secondary" id="btn-restart">↺</button>
      <button class="ctrl-btn c-primary c-wide" id="btn-playpause">Pause</button>
      <button class="ctrl-btn c-secondary" id="btn-skip-timed">Skip</button>
    </div>
    <div class="ctrl-row" id="ctrl-done" style="display:none">
      <button class="ctrl-btn c-secondary" id="btn-restart2">↺</button>
      <button class="ctrl-btn c-green c-wide c-full" id="btn-next">Next</button>
    </div>
    <div class="ctrl-row" id="ctrl-rep" style="display:none">
      <button class="ctrl-btn c-green c-wide" id="btn-done">Done</button>
      <button class="ctrl-btn c-secondary" id="btn-skip-rep">Skip</button>
    </div>
  </div>
</div>

<!-- View 5: Done -->
<div class="view" id="done-view">
  <div class="done-ring">
    <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  </div>
  <div class="done-title">Session Complete</div>
  <div class="done-sub" id="done-sub"></div>
  <button class="done-back" id="done-back-btn">Back to Days</button>
</div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────

const DAYS = [
  {
    id: 'monday', name: 'Monday', focus: 'Legs · Glute Shape & Lift',
    steps: [

      { name: 'Rest', dur: 60, note: 'Breathe. Prepare for next exercise.', type: 'rest' },
      { name: 'Lateral Band Walk', reps: '3×12 each', note: 'Stay low, core stable throughout.', type: 'reps', link: 'https://youtu.be/6eoK_yxY8Ak?si=995KXMF3vnuxryC1' },

      { name: 'Rest', dur: 60, type: 'rest' },
      { name: 'Standing Band Kickback (Lateral)', reps: '3×15 each', note: 'Controlled speed. Squeeze at top.', type: 'reps', link: 'https://youtube.com/shorts/CZvQm1vNzD0?si=ZIwJoszWvg_789_V' },
      { name: 'Cool-down: Ba Duan Jin + Hip Flexor Stretch', dur: 300, note: '双手托天理三焦 x3, then hip flexor stretch. Diaphragmatic breathing throughout.', type: 'rest' },
      { name: 'Zone 2 Cardio: Walk or Bike', reps: '20 min', note: 'Post-strength. Conversational pace. Nose-breathing comfortable.', type: 'reps', link: null },
    ]
  },
  {
    id: 'tuesday', name: 'Tuesday', focus: 'Back · Face Lift · Neck',

// ─── STATE ───────────────────────────────────────────────────────────────────
let currentDay = null, currentStepIdx = 0, detailFromIdx = null;
let timeLeft = 0, totalTime = 0, timerInterval = null, isRunning = false;
const CIRC = 2 * Math.PI * 85; // 534

// ─── AUDIO ───────────────────────────────────────────────────────────────────
const ACtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function tryAudio() { try { if (!audioCtx) audioCtx = new ACtx(); audioCtx.resume(); } catch(e) {} }
function beep(freq=880, dur=0.15, type='sine') {
  try {
    if (!audioCtx) audioCtx = new ACtx();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(0.3, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.start(audioCtx.currentTime); o.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}
function beepDone() {
  setTimeout(() => beep(660, 0.12), 0);
  setTimeout(() => beep(880, 0.12), 150);
  setTimeout(() => beep(1100, 0.22), 300);
}
function beepTick() { beep(440, 0.05, 'square'); }

// ─── VIEWS ───────────────────────────────────────────────────────────────────
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const back = document.getElementById('back-btn');
  const sub  = document.getElementById('header-sub');
  if (id === 'day-picker')   { back.style.display = 'none';  sub.textContent = 'Choose your day'; }
  else if (id === 'session-view') { back.style.display = 'block'; sub.textContent = currentDay?.name || ''; }
  else if (id === 'detail-view')  { back.style.display = 'block'; sub.textContent = 'Exercise Detail'; }
  else if (id === 'flow-view')    { back.style.display = 'block'; sub.textContent = currentDay?.name || ''; }
  else { back.style.display = 'block'; sub.textContent = currentDay?.name || ''; }
}

// ─── DAY PICKER ──────────────────────────────────────────────────────────────
function buildDayPicker() {
  const list = document.getElementById('day-list');
  list.innerHTML = '';
  DAYS.forEach((day, i) => {
    const timedCount = day.steps.filter(s => s.dur && s.type !== 'rest').length;
    const row = document.createElement('div');
    row.className = 'day-row';
    row.innerHTML = `
      <span class="day-idx">0${i+1}</span>
      <div class="day-body">
        <div class="day-name">${day.name}</div>
        <div class="day-focus">${day.focus}</div>
      </div>
      <div class="day-right">
        ${timedCount > 0 ? `<span class="day-tag">${timedCount} timers</span>` : ''}
        <span class="day-chev">›</span>
      </div>`;
    row.addEventListener('click', () => { tryAudio(); openDay(day); });
    list.appendChild(row);
  });
}

// ─── SESSION VIEW ─────────────────────────────────────────────────────────────
function openDay(day) {
  currentDay = day;
  document.getElementById('sess-title').textContent = day.name;
  document.getElementById('sess-sub').textContent = day.focus;
  const list = document.getElementById('step-list');
  list.innerHTML = '';
  let exNum = 0;
  day.steps.forEach((step, i) => {
    const isRest = step.type === 'rest' || step.type === 'breathe';
    if (!isRest) exNum++;
    const row = document.createElement('div');
    row.className = 'step-row' + (isRest ? '' : ' clickable');
    const dur = step.dur;
    const durText = dur
      ? (dur >= 60 ? Math.floor(dur/60)+'m'+(dur%60?dur%60+'s':'') : dur+'s')
      : (step.reps || '');
    const isTimedExercise = dur && !isRest;
    row.innerHTML = `
      <span class="step-idx${isRest ? ' is-rest' : ''}">${isRest ? '·' : String(exNum).padStart(2,'0')}</span>
      <div class="step-body">
        <div class="step-name${isRest ? ' is-rest' : ''}">${step.name}</div>
        ${step.note && !isRest ? `<div class="step-note">${step.note.substring(0,58)}${step.note.length>58?'…':''}</div>` : ''}
      </div>
      <div class="step-right">
        ${step.link ? '<span class="yt-dot"></span>' : ''}
        ${durText ? `<span class="step-chip${isTimedExercise ? ' timed' : ''}">${durText}</span>` : ''}
      </div>`;
    if (!isRest) row.addEventListener('click', () => openDetail(i));
    list.appendChild(row);
  });
  showView('session-view');
}

// ─── DETAIL VIEW ──────────────────────────────────────────────────────────────
function openDetail(idx) {
  detailFromIdx = idx;
  const step = currentDay.steps[idx];
  document.getElementById('det-name').textContent = step.name;
  document.getElementById('det-reps').textContent = step.dur ? step.dur + 's' : (step.reps || '');
  document.getElementById('det-note').textContent = step.note || 'No additional notes.';
  const yt = document.getElementById('det-yt');
  if (step.link) { yt.href = step.link; yt.style.display = 'inline-flex'; }
  else { yt.style.display = 'none'; }
  showView('detail-view');
}
document.getElementById('det-start-btn').addEventListener('click', () => { tryAudio(); startSession(currentDay, detailFromIdx); });

// ─── FLOW ─────────────────────────────────────────────────────────────────────
function startSession(day, fromIdx = 0) { currentDay = day; loadStep(fromIdx); showView('flow-view'); }

function loadStep(idx) {
  if (idx >= currentDay.steps.length) { showDone(); return; }
  clearInterval(timerInterval); isRunning = false;
  currentStepIdx = idx;
  const step = currentDay.steps[idx];
  const typeClass = { rest: 'rest', breathe: 'breathe', hold: 'hold', reps: 'reps' }[step.type] || 'reps';
  const typeText  = { rest: 'Rest', breathe: 'Breathe', hold: 'Hold', reps: 'Exercise' }[step.type] || 'Timer';
  const tag = document.getElementById('fl-tag');
  tag.className = 'fl-tag ' + typeClass;
  tag.textContent = typeText;
  document.getElementById('fl-stepnum').textContent = `Step ${idx+1} of ${currentDay.steps.length}`;
  document.getElementById('fl-name').textContent = step.name;
  updateUpNext(idx);

  if (step.dur != null) {
    document.getElementById('timed-layout').style.display = 'flex';
    document.getElementById('rep-layout').style.display = 'none';
    document.getElementById('fl-note').textContent = step.note || '';
    const colors = { rest: '#60a5fa', breathe: '#f59e0b', hold: '#10b981' };
    document.getElementById('ring-fg').style.stroke = colors[step.type] || '#10b981';
    timeLeft = step.dur; totalTime = step.dur;
    updateDisplay(timeLeft); updateRing(timeLeft, totalTime);
    showCtrl('running'); startTimer();
  } else {
    document.getElementById('timed-layout').style.display = 'none';
    document.getElementById('rep-layout').style.display = 'flex';
    document.getElementById('fl-reps').textContent = step.reps || '';
    document.getElementById('fl-rep-note').textContent = step.note || '';
    const flYt = document.getElementById('fl-yt');
    if (step.link) { flYt.href = step.link; flYt.style.display = 'inline-flex'; }
    else { flYt.style.display = 'none'; }
    showCtrl('rep');
  }
}

function showCtrl(s) {
  document.getElementById('ctrl-running').style.display = s === 'running' ? 'flex' : 'none';
  document.getElementById('ctrl-done').style.display   = s === 'done'    ? 'flex' : 'none';
  document.getElementById('ctrl-rep').style.display    = s === 'rep'     ? 'flex' : 'none';
}

function startTimer() {
  clearInterval(timerInterval); isRunning = true;
  document.getElementById('btn-playpause').textContent = 'Pause';
  timerInterval = setInterval(tick, 1000);
}
function pauseTimer() {
  clearInterval(timerInterval); isRunning = false;
  document.getElementById('btn-playpause').textContent = 'Resume';
}
function tick() {
  timeLeft--;
  if (timeLeft <= 3 && timeLeft > 0) beepTick();
  updateDisplay(timeLeft); updateRing(timeLeft, totalTime);
  if (timeLeft <= 0) { clearInterval(timerInterval); isRunning = false; beepDone(); showCtrl('done'); }
}
function handleSkip() {
  clearInterval(timerInterval); isRunning = false;
  const steps = currentDay.steps;
  const cur = steps[currentStepIdx];
  let next = currentStepIdx + 1;
  if (cur.type !== 'rest' && cur.type !== 'breathe') {
    while (next < steps.length && steps[next].type !== 'rest' && steps[next].type !== 'breathe') next++;
  }
  beep(660, 0.1);
  if (next >= steps.length) { showDone(); return; }
  loadStep(next);
}
function handleNext() { beep(660, 0.1); loadStep(currentStepIdx + 1); }

function updateDisplay(t) {
  const m = Math.floor(t/60), s = t%60;
  document.getElementById('time-display').textContent = m > 0 ? `${m}:${String(s).padStart(2,'0')}` : String(t);
  document.getElementById('time-label').textContent = m > 0 ? 'min' : (t === 1 ? 'second' : 'seconds');
}
function updateRing(t, total) {
  document.getElementById('ring-fg').style.strokeDashoffset = CIRC * (1 - (total > 0 ? t/total : 0));
}
function updateUpNext(idx) {
  const next = currentDay.steps[idx+1];
  const box = document.getElementById('up-next-box');
  if (next) {
    const lbl = next.dur != null ? `${next.name} · ${next.dur}s` : `${next.name}${next.reps ? ' · '+next.reps : ''}`;
    document.getElementById('up-next-name').textContent = lbl;
    box.style.display = 'block';
  } else { box.style.display = 'none'; }
}
function showDone() {
  clearInterval(timerInterval);
  document.getElementById('done-sub').textContent = `${currentDay.name} — ${currentDay.focus}`;
  showView('done-view');
}

// ─── EVENT LISTENERS ─────────────────────────────────────────────────────────
document.getElementById('btn-playpause').addEventListener('click', () => { tryAudio(); isRunning ? pauseTimer() : startTimer(); });
document.getElementById('btn-restart').addEventListener('click', () => { tryAudio(); clearInterval(timerInterval); beep(440,0.08); loadStep(currentStepIdx); });
document.getElementById('btn-restart2').addEventListener('click', () => { tryAudio(); clearInterval(timerInterval); beep(440,0.08); loadStep(currentStepIdx); });
document.getElementById('btn-skip-timed').addEventListener('click', () => { tryAudio(); handleSkip(); });
document.getElementById('btn-next').addEventListener('click', () => { tryAudio(); handleNext(); });
document.getElementById('btn-done').addEventListener('click', () => { tryAudio(); handleNext(); });
document.getElementById('btn-skip-rep').addEventListener('click', () => { tryAudio(); handleSkip(); });
document.getElementById('start-btn').addEventListener('click', () => { tryAudio(); startSession(currentDay, 0); });
document.getElementById('back-btn').addEventListener('click', () => {
  clearInterval(timerInterval);
  const active = document.querySelector('.view.active')?.id;
  if (active === 'flow-view' || active === 'detail-view') openDay(currentDay);
  else if (active === 'session-view') { currentDay = null; buildDayPicker(); showView('day-picker'); }
  else { currentDay = null; showView('day-picker'); }
});
document.getElementById('done-back-btn').addEventListener('click', () => {
  clearInterval(timerInterval); currentDay = null; buildDayPicker(); showView('day-picker');
});

// ─── INIT ────────────────────────────────────────────────────────────────────
buildDayPicker();
showView('day-picker');
</script>
</body>
</html>
